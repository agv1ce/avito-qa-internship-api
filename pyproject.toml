[tool.black]
line-length = 99
target-version = ['py312']
include = '\.pyi?$'

[tool.flake8]
max-line-length = 99
exclude = [".git", "__pycache__", "allure-results"]
ignore = ["E203", "W503"]

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true